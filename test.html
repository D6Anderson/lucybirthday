<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
body{margin:0;background:#0b0d14;color:white;font-family:Georgia,serif}
.page{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.page.show{display:flex}
button{padding:1rem 2rem;font-size:1rem;cursor:pointer;background:#c8a96e;border:none;border-radius:4px;color:#0b0d14;font-weight:bold}
</style>
</head>
<body>
<div id="p1" class="page show">
  <h1>Page 1</h1>
  <button onclick="alert('clicked!'); go(2)">Go to Page 2</button>
</div>
<div id="p2" class="page">
  <h1>Page 2</h1>
  <button onclick="go(3)">Go to Page 3</button>
</div>
<div id="p3" class="page">
  <h1>Page 3 - It works!</h1>
  <button onclick="go(1)">Back to start</button>
</div>
<script>
function go(n) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('show'); });
  document.getElementById('p'+n).classList.add('show');
}
</script>
</body>
</html>
